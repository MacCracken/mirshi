name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:   # reusable: release.yml gates on this CI workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (pinned — CVE-21)

      - name: Install Cyrius toolchain
        # The cyrius.cyml [package].cyrius pin is the single source of
        # truth for the toolchain version — never hardcode it here. Read
        # the pin and hand it to the canonical upstream installer, which
        # fetches + lays out $HOME/.cyrius/{bin,lib}. Do NOT hand-roll
        # curl+tar+cp — scripts/install.sh is the supported entry point
        # (matches patra / sigil).
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/${{ github.event.repository.name }}

      - name: Test
        # v5.6.28: bare `cyrius test` picks up the [build].test entry
        # AND auto-discovers tests/*.tcyr — avoids the previous
        # `cyrius test src/test.cyr` form that hard-failed when the
        # stub didn't exist (Issue 1) and also wouldn't ever exercise
        # tests/${proj}.tcyr. This is the hermetic floor: the pure
        # decode/format logic (src/decode.cyr) with no ptrace dependency.
        run: cyrius test

      - name: M0 trap integration test
        # The REAL fork+execve+PTRACE_SYSEMU path — the M0 acceptance gate —
        # which a pure-cyrius .tcyr cannot express. Kept SEPARATE from `cyrius
        # test` so a ptrace/Yama/seccomp environment failure is diagnosable and
        # never masquerades as a unit-test failure. ubuntu-latest is x86_64 and
        # a full VM at Yama ptrace_scope=1; mirshi traces its OWN direct child,
        # permitted with no CAP_SYS_PTRACE. A future container/Docker job (M3)
        # must add: --cap-add=SYS_PTRACE --security-opt seccomp=unconfined.
        run: bash scripts/it/m0_trap.sh

      - name: M1 run integration test
        # The real translate+execute path (M1 acceptance): agnos hello + stdin
        # cat run under mirshi via PTRACE_SYSCALL translation, exit codes
        # propagate, and a heap fixture proves mmap#27 is executed in-child (the
        # M0->M1 segfault regression gate). Same ptrace requirements as the M0
        # step. Kept separate so a translation regression is diagnosable.
        run: bash scripts/it/m1_run.sh

      - name: M2 fs integration test
        # The filesystem surface (M2 acceptance): agnos open/read/write/close/
        # cp/mkdir/rename/link/unlink/stat/getdents run under real translation
        # against a sandboxed temp rootfs, asserted by HOST EFFECTS. Exercises
        # the red-zone path staging + process_vm_* + the stat/getdents repacks.
        # Same ptrace requirements as the M0/M1 steps.
        run: bash scripts/it/m2_fs.sh

      - name: Fault-injection hardening gate
        # The 0.6.0 hardening gate: throw misbehaving / hostile agnos children at
        # mirshi (bad pointers, child SIGSEGV, unknown syscalls, a syscall storm,
        # spawn#3 fork-bomb attempts, and mmap#27 / open#7 resource-exhaustion
        # storms) and assert the SUPERVISOR stays stable — no crash, no hang (each
        # run is under a 15s timeout), a known-good canary still passes after each
        # fault, and the HOST is untouched (no zombies, kernel-enforced rlimits cap
        # the storms). Same ptrace requirements as the M0/M1/M2 steps (mirshi traces
        # its own direct child; no CAP_SYS_PTRACE on ubuntu-latest); kept separate so
        # a hardening regression is diagnosable and never masquerades as a unit-test
        # failure.
        run: bash scripts/it/fault_inject.sh

      - name: Group-stop signal handling
        # 0.6.0 hardening (supervisor signal handling): an external SIGSTOP to the
        # agnos child surfaces as a ptrace group-stop; mirshi must discriminate it
        # (PTRACE_GETSIGINFO) and resume the child (no signal) so it runs to completion
        # and the supervisor never dies with the child stuck. Same ptrace requirements
        # as the M0/M1/M2 steps; kept separate (it drives an async external signal with
        # timing) so a regression is diagnosable.
        run: bash scripts/it/groupstop.sh

      - name: Supervisor hardening (heap bound + hung-child cleanup)
        # 0.6.0 hardening of the SUPERVISOR's own robustness against a hung/abusive
        # child: (1) a child that loops the emulated uptime_ms#40 must not grow
        # mirshi's heap without bound (the per-call dispatcher alloc leak — a child-
        # driven supervisor-OOM, now a one-time static buffer); (2) terminating mirshi
        # while the child is stuck must leave no orphan and no zombie (PTRACE_O_EXITKILL;
        # no watchdog needed). Same ptrace requirements as the M0/M1/M2 steps.
        run: bash scripts/it/supervisor_hardening.sh

      - name: Allocation-clean hot path (0-alloc per syscall)
        # 0.8.0 optimization gate: the supervisor's per-syscall hot path allocates
        # NOTHING per translated call (mirshi's bump allocator never frees, so any
        # per-call alloc is linear RSS growth under a storm). Storms the EXECUTE
        # pass-through (getpid#2) and fs path-staging (stat#33) classes and asserts
        # mirshi's RSS stays flat — complementing supervisor_hardening's emulate-path
        # (uptime#40) heap-bound check. Same ptrace requirements as the M0/M1/M2 steps.
        run: bash scripts/it/alloc_clean.sh

      - name: Path confinement (--root rootfs jail)
        # 0.7.1 path-escape containment (the audit class-c blocker fix): under
        # --root <dir>, open#7 is rewritten to openat2 with RESOLVE_IN_ROOT anchored
        # at a per-child rootfd, so absolute paths, .. traversal, and symlink targets
        # are clamped INSIDE the root while in-root paths resolve. Self-validating
        # (proves the escape leaks WITHOUT --root first). Same ptrace requirements as
        # the M0/M1/M2 steps.
        run: bash scripts/it/confine.sh

      - name: CLI contract (frozen surface + exit codes)
        # 0.9.0 CLI freeze: pin the command-line contract (docs/reference/cli.md) —
        # usage on misuse (no args / --root without a dir -> exit 2) and the
        # EXECVE_FAILED exit code (127). Complements the mode-specific ITs (m0_trap =
        # --selftest-trace, m1_run = exit propagation, confine = --root). Same ptrace
        # requirements as the M0/M1/M2 steps (one assertion forks a child).
        run: bash scripts/it/cli.sh

      - name: Net band — TCP client (v1.1.0)
        # v1.1.0 net band (docs/adr/0012): the supervisor-emulated sock_connect#47 /
        # sock_close#50 establish + tear down a real TCP connection to a local server,
        # and the --net-allow egress policy is enforced (an un-allowed dst is DENIED ->
        # agnos -1). Needs python3 + the same-uid ptrace requirement as the M0/M1/M2 steps.
        run: bash scripts/it/net_client.sh

      - name: Net band — send/recv round-trip (v1.1.0)
        # v1.1.0 net band MVP (docs/adr/0012): an agnos httpget does a full TCP round-trip
        # under mirshi — connect#47 / send#48 (the GET) / recv#49 loop until EOF (the INVERTED
        # recv-EOF: 0=WOULD_BLOCK, -1=EOF) / close#50 — against a local HTTP server, and the
        # response body comes back on stdout. Needs python3 + the same-uid ptrace requirement.
        run: bash scripts/it/net_io.sh

      - name: Net band — TCP server (v1.2.0)
        # v1.2.0 net band (docs/adr/0012): an agnos server under mirshi does sock_listen#56
        # (loopback bind by default; --net-listen-any binds all ifaces), sock_accept#57 an
        # incoming connection, recv/send, and sock_close#50 the listener (reaping the accepted
        # conn) — a python client gets the reply. Needs python3 + the same-uid ptrace requirement.
        run: bash scripts/it/net_server.sh

      - name: Net band — UDP (v1.3.0)
        # v1.3.0 net band (docs/adr/0012): an agnos UDP client under mirshi does udp_bind#51
        # (loopback), udp_send#52 a datagram (per-datagram egress check) to a local UDP echo
        # server, udp_recv#53 the reply with the sender addr_out {ip,port}, udp_unbind#54.
        # Needs python3 + the same-uid ptrace requirement.
        run: bash scripts/it/net_udp.sh

      - name: Net band — net_config (v1.3.0)
        # v1.3.0 net_config#61 (docs/adr/0012): mirshi reads the real container-netns config —
        # gateway from /proc/net/route, DNS from /etc/resolv.conf, host IP via a getsockname
        # trick (netmask 0-unset) — and returns the kernel-ip4 values. The gate compares against
        # the environment's own files. Needs python3 + the same-uid ptrace requirement.
        run: bash scripts/it/net_config.sh

      - name: Net band — ICMP (v1.4.0)
        # v1.4.0 net band (docs/adr/0012): an agnos client under mirshi does icmp_echo#55 to
        # 127.0.0.1 via an UNPRIVILEGED ping socket (SOCK_DGRAM+IPPROTO_ICMP — never SOCK_RAW/
        # CAP_NET_RAW) and gets an RTT >= 0; per-destination egress is enforced. Unprivileged ICMP
        # is environment-sensitive (net.ipv4.ping_group_range) so the gate SKIPs where it is
        # forbidden. Needs python3 + the same-uid ptrace requirement.
        run: bash scripts/it/net_icmp.sh

      - name: Multi-process — spawn#3 (v1.5.0)
        # v1.5.0 multi-process (BITE 7): an agnos parent under mirshi reads a child ELF and
        # sys_spawn#3's it — the supervisor forks a new TRACED grandchild (memfd + execveat of the
        # in-memory ELF), and BOTH run under one wait4(-1) demux loop. Proves the supervisor as a
        # small process tree. Needs the same-uid ptrace requirement.
        run: bash scripts/it/spawn.sh

      - name: Multi-process — waitpid#4 (v1.5.0)
        # v1.5.0 multi-process (BITE 8, milestone): an agnos parent sys_spawn#3's a child and
        # sys_waitpid#4's it, getting the exact exit code via BOTH the park+wake path (the parent is
        # left stopped — not blocking the supervisor — until the child exits) and the zombie fast-path
        # (claim an already-exited child's retained code); waiting on a reaped pid returns -1. Needs
        # the same-uid ptrace requirement.
        run: bash scripts/it/waitpid.sh

      - name: Multi-process — getpid#2 pid model (v1.5.0)
        # v1.5.0 multi-process (BITE 9): getpid#2 is EMULATE, returning the caller's coined agnos pid
        # (root=1, a spawn#3 child=2) instead of the host getpid#39 — so each process sees ITS agnos
        # pid, matching what spawn returns to the parent. Needs the same-uid ptrace requirement.
        run: bash scripts/it/getpid.sh

      - name: Multi-process — fork-storm bound + grandchild depth (v1.5.0)
        # v1.5.0 multi-process (BITE 10): the fork-storm bound (spawn past MAX_CHILDREN=16 returns
        # agnos -1, no host process leak — re-closing the ADR 0006 vector that EMULATE spawn reopens)
        # and 3-level process-tree depth (root -> child -> grandchild, proving the flat record table
        # handles nesting). Needs the same-uid ptrace requirement.
        run: bash scripts/it/spawn_storm.sh

      - name: Signals — kill#16 + pause#14 (v1.6.0)
        # v1.6.0 signal band (BITE 1): agnos kill#16 sets a 1<<sig pending bit on the target (self /
        # direct-child scope, pid 0 protected, sig validated), supervisor-emulated over the record
        # table; pause#14 is a bounded yield (returns 0, never wedges the recv poll loop). Delivery
        # (signalfd#18) lands in a later bite. Needs the same-uid ptrace requirement.
        run: bash scripts/it/signals.sh

      - name: Pipe — pipe#25 execute-in-child (v1.7.0)
        # v1.7.0 I/O-mux (BITE 2): agnos pipe#25 is rewritten to Linux pipe2(scratch, O_CLOEXEC) run
        # IN the child; the exit stop widens the two i32 host fds into the agnos {u64 read; u64 write}.
        # The ends are real child fds (read/write/close ride the execute-in-child path). Proves an
        # intra-process round-trip + a create/close loop leaks no fds. Needs the same-uid ptrace req.
        run: bash scripts/it/pipe.sh

      - name: Timerfd — timerfd#22/#23 (v1.7.0)
        # v1.7.0 I/O-mux (BITE 3): agnos timerfd#22/#23 are supervisor-emulated as a stored deadline
        # (no real Linux timerfd fd — invisible to the emulated epoll otherwise). timerfd_create hands
        # out a TIMERFD_BASE+slot id; settime arms it (seconds, CLOCK_MONOTONIC); read#5 delivers the
        # u64 expiration count once the deadline passes (non-blocking, poll-with-pause#14). Proves a
        # one-shot fires ~1s + a periodic re-arms + close frees the slot. Needs the same-uid ptrace req.
        run: bash scripts/it/timerfd.sh

      - name: Epoll — epoll_create#19 / epoll_ctl#20 (v1.7.0)
        # v1.7.0 I/O-mux (BITE 4): agnos epoll#19/#20 are supervisor-emulated — a per-child instance slot
        # holds up to 8 watched RAW agnos ids (sockets/signalfds/timerfds resolved fresh at wait time).
        # epoll_create hands out an EPOLL_BASE+slot id; epoll_ctl op1=ADD (dedup, 8-cap) / op2=CLEAR;
        # close#6 frees the instance. Proves create/ctl/close semantics (epoll_wait#21 is BITE 5). Same-uid.
        run: bash scripts/it/epoll.sh

      - name: Epoll_wait — epoll_wait#21 keystone (v1.7.0)
        # v1.7.0 I/O-mux (BITE 5): the heterogeneous bounded-yield readiness engine. One epoll set watches
        # a timerfd (supervisor deadline) + a signalfd (supervisor mask) + a socket (ppoll the supervisor-
        # held host fd) and wakes on whichever fires, returning the raw watched id + EPOLLIN. Never parks
        # (single-threaded supervisor). The roadmap gate (epoll set + timerfd) + best-effort socket. Same-uid.
        run: bash scripts/it/epoll_wait.sh

      - name: M3 docker smoke test
        # The v1 vehicle (M3 acceptance): build the FROM-scratch agnos-mirshi
        # image, `docker run` agnos tools in a plain container (correct output,
        # NO qemu in the image), and a multi-container fan-out. ubuntu-latest
        # ships Docker; the child runs under mirshi's bounding seccomp allowlist.
        run: bash docker/smoke.sh

      - name: Syscall benchmark (informational, non-gating)
        # Per-syscall translation overhead — reported, not gated (absolute µs
        # drifts with the runner). A reduced N keeps CI fast; see docs/benchmarks.md.
        run: N=20000 REPS=2 bash scripts/bench/bench_syscall.sh || true
